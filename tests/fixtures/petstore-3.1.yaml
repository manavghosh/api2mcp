openapi: "3.1.0"
info:
  title: Petstore (3.1)
  version: "2.0.0"
  description: OpenAPI 3.1 example with JSON Schema 2020-12 features.
  summary: Modern Petstore API
servers:
  - url: https://petstore.example.com/v2
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
webhooks:
  newPetAvailable:
    post:
      operationId: onNewPet
      summary: Webhook fired when a new pet is available
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Acknowledged
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type:
            - string
            - "null"
