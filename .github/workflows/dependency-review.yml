name: Dependency Review

on:
  pull_request:
    branches: [main]

# Scans new dependencies introduced in a PR for known vulnerabilities
# and license compatibility issues before they are merged.
# Docs: https://github.com/actions/dependency-review-action

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on any high or critical vulnerability
          fail-on-severity: high

          # Block GPL licenses — incompatible with MIT distribution
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, AGPL-3.0

          # Post a summary comment on the PR
          comment-summary-in-pr: always
