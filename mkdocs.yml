site_name: API2MCP
site_description: Convert any REST/GraphQL API into a fully functional MCP server with LangGraph orchestration
site_url: https://manavghosh.github.io/api2mcp
repo_url: https://github.com/manavghosh/api2mcp
repo_name: api2mcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - Basic MCP Server: tutorials/basic.md
    - Authentication: tutorials/auth.md
    - LangGraph Orchestration: tutorials/orchestration.md
    - Multi-API Workflows: tutorials/multi-api.md
  - Reference:
    - CLI: reference/cli.md
    - Configuration: reference/config.md
    - API Reference: reference/api/index.md
  - Examples:
    - GitHub Issues: examples/github.md
    - Stripe Payments: examples/stripe.md
    - Multi-API Workflow: examples/multi-api.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/manavghosh/api2mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/api2mcp/
